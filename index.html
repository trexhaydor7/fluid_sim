<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Untitled-Goose Flood Time</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-size: 16pt;
        }
        #editor {
            display: flex;
            width: 100%;
            height: 100%;
        }
        #view {
            flex: 1;
            overflow: hidden;
        }
        #controls {
            background: #220058;
            padding: 5px;
            min-width: 100px;
        }
        #c {
            width: 100%;
            height: 100%;
            display: block;
        }
        .gutter {
            background-color: #000000;
            background-repeat: no-repeat;
            background-position: 50%;
        }
        .gutter.gutter-horizontal {
            cursor: ew-resize;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAeCAYAAADkftS9AAAAIklEQVQoU2M4c+bMfxAGAgYYmwGrIIiDjrELjpo5aiZeMwF+yNnOs5KSvgAAAABJRU5ErkJggg==');
        }
    </style>
</head>
<body>
  <div id="editor">
    <div id="view"><canvas id="c"></canvas></div>
    <div id="controls">
      <div>
      </div>
    </div>
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/split.js/dist/split.min.js"></script>
<script>
    Split(['#view', '#controls'], {
      sizes: [75, 25],
      minSize: [200, 100],
      gutterSize: 8,
      direction: 'horizontal',
    });
  </script>

  <script type="module" src="/main.js"></script>
</body>
</html>
